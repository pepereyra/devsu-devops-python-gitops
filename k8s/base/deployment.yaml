apiVersion: apps/v1
kind: Deployment
metadata:
  name: devsu-devops-python

spec:
  replicas: 2

  revisionHistoryLimit: 5

  selector:
    matchLabels:
      app: devsu-devops-python

  template:
    metadata:
      labels:
        app: devsu-devops-python

    spec:

      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000

      containers:
        - name: devsu-devops-python

          image: ghcr.io/pepereyra/devsu-devops-python:latest
          imagePullPolicy: Always

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true

            capabilities:
              drop:
                - ALL

          volumeMounts:
            - name: tmp
              mountPath: /tmp

          command:
            - gunicorn

          args:
            - demo.wsgi:application
            - --bind
            - 0.0.0.0:8000
            - --workers
            - "2"
            - --timeout
            - "60"

          ports:
            - containerPort: 8000

          envFrom:
            - configMapRef:
                name: devsu-devops-python-config

            - secretRef:
                name: devsu-devops-python-secret

            - secretRef:
                name: devsu-devops-python-db-secret

          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"

            limits:
              cpu: "500m"
              memory: "512Mi"

          livenessProbe:
            httpGet:
              path: /api/health/live/
              port: 8000

            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5

          readinessProbe:
            httpGet:
              path: /api/health/ready/
              port: 8000

            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5

      volumes:
        - name: tmp
          emptyDir: {}